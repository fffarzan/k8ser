apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx # makes a connection between Service and Deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  # this applies to Pod
  template:
    metadata:
      labels:
        app: nginx # makes a connection between Service and Pod
    spec:
      containers:
        - name: nginx
          image: nginx:1.16
          ports:
            - containerPort: 8080
